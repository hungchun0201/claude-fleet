name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Compile check
        run: python -m py_compile app.py core/*.py
      - name: Import check
        run: python -c "import app; from core import actions, codex, history, memory, patrol, perms, plans, search, sessions, skills, transcripts"
